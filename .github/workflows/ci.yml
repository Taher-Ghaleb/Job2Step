name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile
        run: mvn -B -DskipTests compile

      - name: Run unit tests
        run: mvn -B test

      - name: Run integration tests
        if: success() && (contains(fromJSON('["main", "master"]'), github.ref_name) || (github.event_name == 'pull_request' && contains(fromJSON('["main", "master"]'), github.base_ref)))
        run: mvn -B test-compile failsafe:integration-test failsafe:verify
